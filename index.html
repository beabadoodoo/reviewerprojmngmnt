<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM Pro Mastery - Select Mode</title>
    <style>
        :root {
            --primary: #0038a8; 
            --accent: #ff9f43;
            --bg: #f1f3f5;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .menu-container {
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 2rem;
        }

        p {
            color: #666;
            margin-bottom: 30px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .mode-btn {
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none; /* Para sa <a> tag */
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .mode-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .flashcard-btn { background-color: var(--primary); }
        .quiz-btn { background-color: var(--accent); }

        .icon { font-size: 1.5rem; }
    </style>
</head>
<body>

<div class="menu-container">
    <h1>PM Pro Mastery</h1>
    <p>Piliin ang mode ng iyong pag-aaral:</p>

    <div class="button-group">
        <a href="flashcards.html" class="mode-btn flashcard-btn">
            <span class="icon">🗂️</span> Flashcards Mode
        </a>

        <a href="quiz.html" class="mode-btn quiz-btn">
            <span class="icon">📝</span> Multiple Choice Quiz
        </a>
    </div>
</div>

</body>
</html>
